  /api/v1/distributor/createDealer:
    post:
      summary: create dealer
      tags:
        - distributor
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - dealer_name
                - dealer_username
                - dealer_password
                - confirmPassword
                - subscribed_plans # allowNull: false in model
              properties:
                dealer_name:
                  type: string
                dealer_username:
                  type: string
                dealer_password:
                  type: string
                  format: password
                confirmPassword:
                  type: string
                  format: password
                dealer_contact:
                  type: string
                status:
                  type: boolean
                plan_start_date:
                  type: string
                  format: date
                plan_end_date:
                  type: string
                  format: date
                plan_price:
                  type: integer
                plan_id:
                  type: integer
                max_clients_allowed:
                  type: integer
                subscribed_plans:
                  type: array
                  items:
                    type: string
                    enum:
                      [
                        MCX_FUTURE,
                        MCX_OPTION,
                        NSE_FUTURE,
                        NSE_OPTION,
                        COMEX_FUTURE,
                        COMEX_OPTION,
                        NCD_FUTURE,
                        NCD_OPTION,
                        CRYPTO_FUTURE,
                        CRYPTO_OPTION,
                        FOREX_FUTURE,
                        FOREX_OPTION,
                      ]
            example:
              dealer_name: vijay
              dealer_username: vijay
              dealer_password: "123123"
              confirmPassword: "123123"
              dealer_contact: "1234567890"
              status: "true"
              plan_start_date: "2026-01-19"
              plan_end_date: "2027-01-19"
              plan_price: 10000
              plan_id: 1
              max_clients_allowed: 100
              subscribed_plans:
                - MCX_OPTION
                - NSE_OPTION
                - MCX_FUTURE
                - NSE_FUTURE
                - COMEX_FUTURE
      responses:
        "201":
          description: Dealer created successfully
          content:
            application/json:
              example:
                status: "success"
                message: "Dealer created successfully"
                data:
                  dealer_name: "vijay"
                  dealer_username: "vijay"
                  dealer_contact: "1234567890"
                  status: true
                  plan_start_date: "2026-01-19T00:00:00.000Z"
                  plan_end_date: "2027-01-19T00:00:00.000Z"
                  plan_price: 10000
                  plan_id: 1
                  max_clients_allowed: 100
                  subscribed_plans:
                    - MCX_OPTION
                    - NSE_OPTION
                    - MCX_FUTURE
                    - NSE_FUTURE
                    - COMEX_FUTURE
        "400":
          description: Validation error (Duplicate username or length requirement)
          content:
            application/json:
              examples:
                duplicateUsername:
                  value:
                    status: "fail"
                    message: "dealer_username must be unique"
                    data: null
                lengthRequirement:
                  value:
                    status: "fail"
                    message: "Username must be at least 4 characters long"
                    data: null
