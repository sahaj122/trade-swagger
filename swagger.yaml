            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      transactions:
                        type: array
                        items:
                          type: object
                          properties:
                            amount:
                              type: number
                            balance_after:
                              type: number
                            id:
                              type: integer
                            dealer_id:
                              type: integer
                            client_id:
                              type: integer
                            transaction_type:
                              type: string
                              enum: [DEPOSIT, WITHDRAWAL, TRADE_SETTLEMENT, ADJUSTMENT]
                            note:
                              type: string
                              nullable: true
                            deleted_at:
                              type: string
                              format: date-time
                              nullable: true
                            created_at:
                              type: string
                              format: date-time
                            updated_at:
                              type: string
                              format: date-time
                      pagination:
                        type: object
                        properties:
                          current_page:
                            type: integer
                          limit_per_page:
                            type: integer
                          has_next_page:
                            type: boolean
                          has_previous_page:
                            type: boolean
                          date_range:
                            type: object
                            properties:
                              start:
                                type: string
                                format: date-time
                              end:
                                type: string
                                format: date-time
              example:
                status: success
                message: "Transaction history retrieved successfully"
                data:
                  transactions:
                    - amount: 100000
                      balance_after: 0
                      id: 5
                      dealer_id: 1
                      client_id: 13
                      transaction_type: "WITHDRAWAL"
                      note: "money withdrawal"
                      deleted_at: null
                      created_at: "2026-04-23T15:02:20.252Z"
                      updated_at: "2026-04-23T15:02:20.253Z"
                  pagination:
                    current_page: 1
                    limit_per_page: 20
                    has_next_page: false
                    has_previous_page: false
                    date_range:
                      start: "2026-04-13T18:30:00.000Z"
                      end: "2026-04-24T18:29:59.999Z"
