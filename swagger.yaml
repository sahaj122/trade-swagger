  /api/v1/watchlist/addItem:
    post:
      summary: Add multiple instruments with details to a watchlist
      description: "Performs a bulk addition of instruments to a watchlist, including detailed metadata for each instrument."
      tags:
        - watchlist
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - watchlistId
                - instruments
              properties:
                watchlistId:
                  type: integer
                instruments:
                  type: array
                  items:
                    type: object
                    required:
                      - instrumentKey
                      - exchangeToken
                      - expiryDate
                      - instrumentDetails
                    properties:
                      instrumentKey:
                        type: string
                      exchangeToken:
                        type: string
                      expiryDate:
                        type: integer
                        format: int64
                      instrumentDetails:
                        type: object
                        properties:
                          lot_size:
                            type: string
                          qty_multiplier:
                            type: string
                          segment:
                            type: string
                          trading_symbol:
                            type: string
                          underlying_symbol:
                            type: string
                          weekly:
                            type: string
                          exchangeType:
                            type: string
                          instrumentType:
                            type: string
                          expiry_date:
                            type: string
                          asset_type:
                            type: string
            example:
              watchlistId: 642
              instruments:
                - instrumentKey: "MCX_FO|457532"
                  exchangeToken: "447553"
                  expiryDate: 1778005799000
                  instrumentDetails:
                    lot_size: "30"
                    qty_multiplier: "30"
                    segment: "MCX_FO"
                    trading_symbol: "SILVER FUT 05 MAY 26"
                    underlying_symbol: "SILVER"
                    weekly: "false"
                    exchangeType: "MCX_FO"
                    instrumentType: "FUT"
                    expiry_date: "1778005799000"
                    asset_type: "COM"
      responses:
        '200':
          description: Instruments added with details successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      watchlistId:
                        type: integer
                      itemsAdded:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: integer
                            watchlist_id:
                              type: integer
                            instrument_key:
                              type: string
                            exchange_token:
                              type: integer
                            expiry_date:
                              type: string
                              format: date-time
                            order_index:
                              type: integer
                            instrument_details:
                              type: object
                              properties:
                                weekly:
                                  type: string
                                segment:
                                  type: string
                                lot_size:
                                  type: string
                                asset_type:
                                  type: string
                                expiry_date:
                                  type: string
                                exchangeType:
                                  type: string
                                instrumentType:
                                  type: string
                                qty_multiplier:
                                  type: string
                                trading_symbol:
                                  type: string
                                underlying_symbol:
                                  type: string
                            createdAt:
                              type: string
                              format: date-time
                            updatedAt:
                              type: string
                              format: date-time
              example:
                status: success
                message: "1 instruments added to watchlist successfully."
                data:
                  watchlistId: 642
                  itemsAdded:
                    - id: 5
                      watchlist_id: 642
                      instrument_key: "MCX_FO|457532"
                      exchange_token: 447553
