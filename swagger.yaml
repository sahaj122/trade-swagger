  /api/v1/distributor/updateDealerDetails/{username}:
    patch:
      summary: update dealer
      tags:
        - distributor
      security:
        - BearerAuth: []
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
          example: abhi123456
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                dealer_name:
                  type: string
                dealer_contact:
                  type: string
                  nullable: true
                status:
                  type: boolean
                plan_price:
                  type: integer
                max_clients_allowed:
                  type: integer
                subscribed_plans:
                  type: array
                  items:
                    type: string
            example:
              dealer_name: "Abhi Sharma"
              dealer_contact: "9876543210"
              status: false
              plan_price: 30000
              max_clients_allowed: 10
              subscribed_plans: [ "NSE_FUTURE", "MCX_OPTION" ]
      responses:
        "200":
          description: Dealer updated successfully
          content:
            application/json:
              example:
                status: "success"
                message: "Dealer updated successfully"
                data: null
        "404":
          description: Dealer not found or no changes made
          content:
            application/json:
              example:
                message: "Dealer not found or no changes made"
        "500":
          description: Internal Server Error - User not found
          content:
            application/json:
              example:
                status: "error"
                message: "No user found with username: abhi123"
                data: null
