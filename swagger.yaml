        - dealer
      security:
        - BearerAuth: []
      parameters:
        - name: client_id
          in: path
          required: true
          schema:
            type: integer
          description: The ID of the client whose history is being fetched.
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
          description: The page number for pagination.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
          description: Number of transactions to return per page.
